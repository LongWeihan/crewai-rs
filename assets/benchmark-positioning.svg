<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="86" y1="68" x2="1502" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091540"/>
      <stop offset="0.42" stop-color="#183A37"/>
      <stop offset="1" stop-color="#C44900"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="980" rx="42" fill="url(#bg)"/>
  <circle cx="1300" cy="172" r="210" fill="#FFD166" fill-opacity="0.14"/>
  <circle cx="250" cy="832" r="250" fill="#5BC0BE" fill-opacity="0.12"/>
  <rect x="76" y="72" width="1448" height="836" rx="30" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.22"/>

  <text x="126" y="166" fill="#F7F7F2" font-size="58" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Benchmark + Positioning</text>
  <text x="126" y="218" fill="#D8F3DC" font-size="28" font-family="Segoe UI, Helvetica, Arial, sans-serif">A single-screen view of runtime overhead and where crewai-rs fits against Python-first orchestration.</text>

  <rect x="126" y="274" width="654" height="564" rx="30" fill="#0B132B" stroke="#5BC0BE" stroke-width="2"/>
  <text x="168" y="344" fill="#5BC0BE" font-size="38" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Runtime Overhead</text>
  <text x="168" y="388" fill="#F7F7F2" font-size="22" font-family="Segoe UI, Helvetica, Arial, sans-serif">Observed range across 3 release runs on a Ryzen 9 7950X.</text>

  <text x="168" y="454" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">flow_run</text>
  <rect x="168" y="472" width="88" height="16" rx="8" fill="#E0FF4F"/>
  <text x="276" y="487" fill="#D8F3DC" font-size="22" font-family="Segoe UI, Helvetica, Arial, sans-serif">368-461 ns</text>
  <text x="168" y="520" fill="#F7F7F2" font-size="20" font-family="Segoe UI, Helvetica, Arial, sans-serif">Typed deterministic flow overhead for a 2-step state machine.</text>

  <text x="168" y="590" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">crew_kickoff_sequential</text>
  <rect x="168" y="608" width="270" height="16" rx="8" fill="#FFD166"/>
  <text x="458" y="623" fill="#FFF3B0" font-size="22" font-family="Segoe UI, Helvetica, Arial, sans-serif">5.7-6.4 us</text>
  <text x="168" y="656" fill="#F7F7F2" font-size="20" font-family="Segoe UI, Helvetica, Arial, sans-serif">2-task crew kickoff with deterministic models and one tool call.</text>

  <text x="168" y="726" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">crew_kickoff_hierarchical</text>
  <rect x="168" y="744" width="332" height="16" rx="8" fill="#C8553D"/>
  <text x="520" y="759" fill="#FFD6C2" font-size="22" font-family="Segoe UI, Helvetica, Arial, sans-serif">7.1-8.0 us</text>
  <text x="168" y="792" fill="#F7F7F2" font-size="20" font-family="Segoe UI, Helvetica, Arial, sans-serif">Same path, plus a manager brief on each task.</text>

  <text x="168" y="862" fill="#D8F3DC" font-size="20" font-family="Segoe UI, Helvetica, Arial, sans-serif">Manager overhead over sequential kickoff: +23.8% to +25.4%</text>

  <rect x="820" y="274" width="654" height="264" rx="30" fill="#0B132B" stroke="#FFD166" stroke-width="2"/>
  <text x="862" y="344" fill="#FFD166" font-size="38" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Why Teams Pick crewai-rs</text>
  <text x="862" y="404" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif">Low orchestration overhead</text>
  <text x="862" y="444" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif">Typed flow state and step wiring</text>
  <text x="862" y="484" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif">Rust-native embedding and single-binary deployment</text>

  <rect x="820" y="574" width="654" height="264" rx="30" fill="#0B132B" stroke="#E0FF4F" stroke-width="2"/>
  <text x="862" y="644" fill="#E0FF4F" font-size="38" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700">Why Some Teams Still Pick CrewAI</text>
  <text x="862" y="704" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif">More mature observability and platform surface</text>
  <text x="862" y="744" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif">Persistence and streaming documented today</text>
  <text x="862" y="784" fill="#F7F7F2" font-size="24" font-family="Segoe UI, Helvetica, Arial, sans-serif">Broader ecosystem, examples, and integrations</text>

  <rect x="168" y="885" width="1306" height="1" fill="#FFFFFF" fill-opacity="0.18"/>
  <text x="126" y="940" fill="#D8F3DC" font-size="18" font-family="Segoe UI, Helvetica, Arial, sans-serif">Numbers reflect local release-mode microbenchmarks with deterministic in-memory models and tools. They describe framework overhead, not provider latency.</text>
</svg>
